{{ define "main" }}
<article>
  <div class="post-header">
    {{ if not .Date.IsZero }}
    <span class="post-date">{{ .Date.Format "January 2, 2006" }}</span>
    {{ end }}
    <h1 class="post-title">{{ .Title }}</h1>
    {{ with .Description }}<p class="post-description">{{ . }}</p>{{ end }}
    {{ if not (eq .Params.layout "about") }}
    <div class="post-tags" style="margin-top: 1rem;">
      {{ range .Params.tags }}
      <span class="tag">{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}
  </div>

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
