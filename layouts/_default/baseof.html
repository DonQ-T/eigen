<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}Don Q — Machine Learning · Mathematics · Research{{ else }}{{ .Title }} — Don Q{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ]
    });">
  </script>
</head>
<body>
  <header>
    <nav>
      <a href="/donq-site/" class="site-name">DON Q<span class="transpose"><span class="dot">.</span>T</span></a>
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="footer-content">
      <ul class="footer-links">
        <li><a href="https://www.youtube.com/@donq.T" target="_blank">YouTube</a></li>
        <li><a href="https://www.instagram.com/donqt.ai/" target="_blank">Instagram</a></li>
        <li><a href="https://github.com/DonQ-T" target="_blank">GitHub</a></li>
      </ul>
      <p class="footer-copy">&copy; {{ now.Year }} Don Q — Matt Jacob</p>
    </div>
  </footer>
</body>
</html>
