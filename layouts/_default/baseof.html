<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}Eigen — Mathematics · Machine Learning · Research{{ else }}{{ .Title }} — Eigen{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ]
    });">
  </script>
</head>
<body>
  <header>
    <nav>
      <a href="{{ .Site.BaseURL }}" class="site-name">
        <svg class="hilbert-logo" width="20" height="20" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4.0 4.0 L4.0 12.0 L12.0 12.0 L12.0 4.0 L20.0 4.0 L28.0 4.0 L28.0 12.0 L20.0 12.0 L20.0 20.0 L28.0 20.0 L28.0 28.0 L20.0 28.0 L12.0 28.0 L12.0 20.0 L4.0 20.0 L4.0 28.0 L4.0 36.0 L12.0 36.0 L12.0 44.0 L4.0 44.0 L4.0 52.0 L4.0 60.0 L12.0 60.0 L12.0 52.0 L20.0 52.0 L20.0 60.0 L28.0 60.0 L28.0 52.0 L28.0 44.0 L20.0 44.0 L20.0 36.0 L28.0 36.0 L36.0 36.0 L44.0 36.0 L44.0 44.0 L36.0 44.0 L36.0 52.0 L36.0 60.0 L44.0 60.0 L44.0 52.0 L52.0 52.0 L52.0 60.0 L60.0 60.0 L60.0 52.0 L60.0 44.0 L52.0 44.0 L52.0 36.0 L60.0 36.0 L60.0 28.0 L60.0 20.0 L52.0 20.0 L52.0 28.0 L44.0 28.0 L36.0 28.0 L36.0 20.0 L44.0 20.0 L44.0 12.0 L36.0 12.0 L36.0 4.0 L44.0 4.0 L52.0 4.0 L52.0 12.0 L60.0 12.0 L60.0 4.0"
                stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        Eigen
      </a>
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="footer-content">
      <a href="https://github.com/DonQ-T" target="_blank">GitHub</a>
      <span class="sep">&middot;</span>
      <a href="https://www.instagram.com/eigen.io/" target="_blank">Instagram</a>
      <span class="sep">&middot;</span>
      <a href="https://www.youtube.com/@donq.T" target="_blank">YouTube</a>
      <span class="sep">&middot;</span>
      <a href="mailto:mattjacob1107@gmail.com">Email</a>
    </div>
  </footer>

  {{ if .IsHome }}
  <script src="{{ "js/hilbert.js" | relURL }}"></script>
  {{ end }}
</body>
</html>
