{{ define "main" }}
<h1 style="font-family: var(--font-display); font-weight: 900; font-size: 2rem; letter-spacing: 6px; background: linear-gradient(178deg, var(--gold-bright), var(--gold-dim)); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 2rem;">Blog</h1>

<ul class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <li class="post-item">
    <span class="post-date">{{ .Date.Format "January 2, 2006" }}</span>
    <h3 class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
    <p class="post-excerpt">{{ .Description }}</p>
    <div class="post-tags">
      {{ range .Params.tags }}
      <a href="/tags/{{ . | urlize }}" class="tag">{{ . }}</a>
      {{ end }}
    </div>
  </li>
  {{ end }}
</ul>
{{ end }}
